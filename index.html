<script>
(function () {
  function normalizeDigits(s='') {
    return String(s).replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
  }

  function safeParseDate(input) {
    if (!input) return null;
    const raw = normalizeDigits(String(input)).trim();
    const direct = new Date(raw);
    if (!isNaN(direct)) return direct;

    const parts = raw.split(/[،,]/).map(x => x.trim()).filter(Boolean);
    const datePart = parts[0] || '';
    const timePart = parts[1] || '00:00:00';
    const m = datePart.match(/^(\d{1,4})[\/\-](\d{1,2})[\/\-](\d{1,4})$/);
    if (!m) return null;

    let a = +m[1], b = +m[2], c = +m[3];
    let year, month, day;
    if (a > 31) { year = a; month = b; day = c; }
    else if (c > 31) { day = a; month = b; year = c; }
    else return null;

    const t = timePart.match(/(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
    const hh = t ? +t[1] : 0;
    const mm = t ? +t[2] : 0;
    const ss = t && t[3] ? +t[3] : 0;

    const d = new Date(year, month - 1, day, hh, mm, ss);
    return isNaN(d) ? null : d;
  }

  const oldCheckSession = window.checkSession;
  window.checkSession = async function () {
    if (typeof oldCheckSession === 'function') await oldCheckSession();
    const adv = document.getElementById('adv-filters');
    if (adv) adv.style.display = 'none';
  };

  window.parseClientDate = function (c) {
    return safeParseDate(c && c.createdAt);
  };

  window.getFilteredClients = function () {
    const q       = (document.getElementById('search-input')?.value || '').toLowerCase();
    const src     = document.getElementById('filter-source')?.value || '';
    const status  = document.getElementById('filter-status')?.value || '';
    const program = document.getElementById('filter-program')?.value || '';
    const labelId = document.getElementById('filter-label')?.value || '';
    const dateF   = document.getElementById('filter-date')?.value || '';

    const now = new Date();
    const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const endToday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);

    return clients.filter(c => {
      const matchQ = !q ||
        (c.name || '').toLowerCase().includes(q) ||
        (c.phone || '').includes(q) ||
        (c.email || '').toLowerCase().includes(q) ||
        (c.program || '').toLowerCase().includes(q) ||
        (c.ref || '').toLowerCase().includes(q);

      const matchSrc     = !src || c.source === src;
      const matchStatus  = !status || (status === 'done' ? c.academyAssigned : !c.academyAssigned);
      const matchProgram = !program || (c.program || '').startsWith(program);
      const matchLabel   = !labelId || (c.labels && c.labels.includes(labelId));

      let matchDate = true;
      if (dateF) {
        const cd = safeParseDate(c.createdAt);
        if (!cd) matchDate = false;
        else if (dateF === 'today') matchDate = cd >= startToday && cd <= endToday;
        else if (dateF === 'week') matchDate = (now - cd) <= 7 * 86400000 && cd <= now;
        else if (dateF === 'month') matchDate = cd.getMonth() === now.getMonth() && cd.getFullYear() === now.getFullYear();
      }

      return matchQ && matchSrc && matchStatus && matchProgram && matchLabel && matchDate;
    });
  };

  window.fillProgramSelect = function () {
    const sel = document.getElementById('fp');
    if (!sel) return;
    const cur = sel.value;
    const fixedPrograms = [
      'تحليل السلوك التطبيقي',
      'إدارة السلوك التنظيمي',
      'الاقتصاد السلوكي',
      'برامج التعليم المستمر',
      'حجز مقعد'
    ];
    const extraPrograms = (programs || []).filter(p => !fixedPrograms.includes(p));
    const allPrograms = [...fixedPrograms, ...extraPrograms];
    sel.innerHTML = '<option value="">اختر البرنامج...</option>' +
      allPrograms.map(p => `<option value="${p}">${p}</option>`).join('');
    if (cur && allPrograms.includes(cur)) sel.value = cur;
  };

  window.toggleNotifications = async function () {
    const panel = document.getElementById('notif-panel');
    const open = panel.style.display !== 'none';
    panel.style.display = open ? 'none' : 'block';
    if (!open) {
      if (window.FB) _notifCache = await window.FB.getNotifications();
      _notifCache = _notifCache.map(n => ({ ...n, read: true }));
      renderNotifList();
      renderNotifDot();
    }
  };

  window.renderDetail = function (ref) {
    const c = clients.find(x => x.ref === ref);
    if (!c) return;
    document.getElementById('d-av').textContent = ini(c.name);
    document.getElementById('d-name').textContent = c.name;
    document.getElementById('d-email').textContent = c.email;
    document.getElementById('d-phone').textContent = c.phone || '—';
    document.getElementById('d-ref').textContent = c.ref + ' · ' + c.createdAt;
    document.getElementById('d-prog').textContent = c.program;
    document.getElementById('d-track').textContent = c.track || '—';
    document.getElementById('d-progtype').textContent = c.programType || '—';
    document.getElementById('d-clienttype').textContent = c.clientType || '—';
    document.getElementById('d-src').innerHTML = srcPill(c.source);
    document.getElementById('d-addedby').textContent = c.addedBy || '—';
    document.getElementById('d-date').textContent = c.createdAt;

    const expiryEl = document.getElementById('d-expiry');
    if (c.expiry) {
      const exp = new Date(c.expiry);
      const diff = Math.ceil((exp - new Date()) / 86400000);
      const urgent = diff <= 7 && diff >= 0;
      expiryEl.innerHTML = `<span style="color:${urgent?'#b91c1c':diff<0?'#6b7280':'#b45309'};font-weight:600">${c.expiry} ${diff>=0?'('+diff+' يوم متبقي)':'(منتهي)'}</span>`;
    } else {
      expiryEl.textContent = 'غير محدد';
    }

    document.getElementById('d-assign').innerHTML = needsAssign(c.source)
      ? '<span style="color:var(--red);font-weight:600">نعم — إسناد يدوي في المنصة</span>'
      : '<span style="color:var(--green);font-weight:600">لا — يُسجل تلقائياً</span>';

    const notesWrap = document.getElementById('d-notes-wrap');
    const notesEl = document.getElementById('d-notes');
    if (c.notes) {
      notesWrap.style.display = 'flex';
      notesEl.textContent = c.notes;
    } else {
      notesWrap.style.display = 'none';
      notesEl.textContent = '';
    }

    const canAct = can('academy');
    let s1 = `<div class="sr s-done"><div class="si si-s">م</div><div class="sb"><div class="st">المبيعات — تسجيل البيانات</div><div class="ss">تم · ${c.createdAt}</div></div><div class="ck yes">✓</div></div>`;
    const addDone = c.academyAdded;
    const addClass = addDone ? 's-done' : canAct ? 's-act' : 's-lock';
    const addBtn = canAct && !addDone
      ? `<button class="btn success sm" onclick="markAdded('${c.ref}')">تمت الإضافة ✓</button>`
      : `<div class="ck ${addDone?'yes':'no'}">${addDone?'✓':'–'}</div>`;
    let s2 = `<div class="sr ${addClass}"><div class="si si-a">أ</div><div class="sb"><div class="st">التشغيل — تمت الإضافة في المنصة</div><div class="ss">${addDone ? 'تم' : 'إضافة حساب العميل في المنصة'}</div></div>${addBtn}</div>`;
    let s3 = '';
    if (needsAssign(c.source)) {
      const asnDone = c.academyAssigned;
      const asnClass = asnDone ? 's-done' : addDone && canAct ? 's-act' : 's-lock';
      const asnBtn = canAct && addDone && !asnDone
        ? `<button class="btn sm" style="background:#0D40FC;color:#fff;border-color:#0D40FC;" onclick="markAssigned('${c.ref}')">تم الإسناد ✓</button>`
        : `<div class="ck ${asnDone?'yes':'no'}">${asnDone?'✓':'–'}</div>`;
      s3 = `<div class="sr ${asnClass}"><div class="si si-a">أ</div><div class="sb"><div class="st">التشغيل — تم إسناد المقررات</div><div class="ss">${asnDone ? 'تم الإسناد' : addDone ? 'إسناد المقررات في المنصة يدوياً' : 'بانتظار الإضافة أولاً'}</div></div>${asnBtn}</div>`;
    }
    document.getElementById('d-stages').innerHTML = s1 + s2 + s3;
    renderLabelsPicker();

    const editWrap = document.getElementById('edit-btn-wrap');
    if (editWrap) {
      const u = currentUser();
      const canEdit = can('editClient') && (can('editAny') || c.addedBy === u.username || c.addedBy === u.fullName);
      const firstEditBtn = document.querySelector('#edit-btn-wrap .btn.sm');
      if (firstEditBtn) firstEditBtn.style.display = canEdit ? '' : 'none';
      const delBtn = document.getElementById('delete-client-btn');
      if (delBtn) delBtn.style.display = can('settings') ? '' : 'none';
    }

    const log = c.log || [];
    document.getElementById('d-log').innerHTML = log.length
      ? log.map(l => `<div class="log-row"><span class="log-who">${l.who}</span><span class="log-txt">${l.action}</span><span class="log-time">${l.time}</span></div>`).join('')
      : '<div style="font-size:12px;color:var(--muted);padding:.5rem 0">لا يوجد سجل بعد</div>';
  };

  window.renderProductSales = function () {
    const fromVal = document.getElementById('sales-date-from')?.value;
    const toVal = document.getElementById('sales-date-to')?.value;
    const from = fromVal ? new Date(fromVal) : null;
    const to = toVal ? new Date(toVal + 'T23:59:59') : null;

    const filtered = clients.filter(c => {
      const d = safeParseDate(c.createdAt);
      if (!d) return !from && !to;
      if (from && d < from) return false;
      if (to && d > to) return false;
      return true;
    });

    const total = filtered.length;
    const totalEl = document.getElementById('sales-period-total');
    if (totalEl) {
      const rangeText = from && to ? `${from.toLocaleDateString('ar-SA')} — ${to.toLocaleDateString('ar-SA')}` :
        from ? `من ${from.toLocaleDateString('ar-SA')}` :
        to ? `حتى ${to.toLocaleDateString('ar-SA')}` : 'كل الفترات';
      totalEl.textContent = `إجمالي المبيعات: ${total} عميل  |  ${rangeText}`;
    }

    const counts = {};
    filtered.forEach(c => { counts[c.program || 'غير محدد'] = (counts[c.program || 'غير محدد'] || 0) + 1; });
    const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
    const max = Math.max(...sorted.map(x => x[1]), 1);
    const colors = ['#0D40FC','#001442','#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444'];
    const el = document.getElementById('product-sales-chart');
    if (!el) return;
    if (!sorted.length) { el.innerHTML = '<div class="empty">لا توجد مبيعات في هذه الفترة</div>'; return; }

    el.innerHTML = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="border-bottom:2px solid var(--border)"><th style="text-align:right;padding:8px 6px;color:var(--muted);font-size:11px;font-weight:600">#</th><th style="text-align:right;padding:8px 6px;color:var(--muted);font-size:11px;font-weight:600">المنتج</th><th style="text-align:center;padding:8px 6px;color:var(--muted);font-size:11px;font-weight:600">المبيعات</th><th style="text-align:center;padding:8px 6px;color:var(--muted);font-size:11px;font-weight:600">النسبة</th><th style="text-align:right;padding:8px 6px;min-width:120px;color:var(--muted);font-size:11px;font-weight:600">التوزيع</th></tr></thead><tbody>${
      sorted.map(([name,count],i) => `<tr style="border-bottom:1px solid var(--border);${i===0?'background:var(--blue-lt)':''}"><td style="padding:10px 6px;color:var(--muted);font-size:12px">${i+1}</td><td style="padding:10px 6px;font-weight:${i===0?'700':'500'};color:var(--text)">${name}</td><td style="padding:10px 6px;text-align:center"><span style="font-size:18px;font-weight:800;color:${colors[i%colors.length]}">${count}</span><span style="font-size:11px;color:var(--muted);margin-right:3px">عميل</span></td><td style="padding:10px 6px;text-align:center;font-weight:600;color:${colors[i%colors.length]}">${total ? Math.round(count/total*100) : 0}%</td><td style="padding:10px 6px"><div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden"><div style="height:100%;width:${Math.round(count/max*100)}%;background:${colors[i%colors.length]};border-radius:5px;transition:width .6s ease"></div></div></td></tr>`).join('')
    }</tbody><tfoot><tr style="border-top:2px solid var(--border)"><td colspan="2" style="padding:10px 6px;font-weight:700;color:var(--text)">الإجمالي</td><td style="padding:10px 6px;text-align:center;font-weight:800;font-size:18px;color:var(--blue)">${total}</td><td style="padding:10px 6px;text-align:center;font-weight:600;color:var(--blue)">100%</td><td></td></tr></tfoot></table></div>`;
  };

  window.renderReports = function () {
    const now = new Date();
    const month = now.getMonth();
    const year = now.getFullYear();

    const fromEl = document.getElementById('sales-date-from');
    const toEl = document.getElementById('sales-date-to');
    if (fromEl && !fromEl.value) {
      fromEl.value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
      toEl.value = now.toISOString().split('T')[0];
    }

    renderProductSales();

    const total = clients.length;
    const done = clients.filter(c => c.academyAssigned).length;
    const pending = clients.filter(c => !c.academyAssigned).length;
    const needAsgn = clients.filter(c => needsAssign(c.source) && !c.academyAssigned).length;
    const thisMonth = clients.filter(c => {
      const d = safeParseDate(c.createdAt);
      return d && d.getMonth() === month && d.getFullYear() === year;
    }).length;

    const soon = clients.filter(c => {
      if (!c.expiry) return false;
      const exp = new Date(c.expiry);
      const diff = (exp - now) / 86400000;
      return diff >= 0 && diff <= 30;
    }).sort((a,b) => new Date(a.expiry) - new Date(b.expiry));

    document.getElementById('report-stats').innerHTML = `
      <div class="stat blue"><div class="num">${total}</div><div class="lbl">إجمالي العملاء</div></div>
      <div class="stat green"><div class="num">${done}</div><div class="lbl">مكتملون</div></div>
      <div class="stat amber"><div class="num">${pending}</div><div class="lbl">قيد التفعيل</div></div>
      <div class="stat" style="border-top:3px solid #6366f1"><div class="num">${thisMonth}</div><div class="lbl">هذا الشهر</div></div>
      <div class="stat" style="border-top:3px solid #ef4444"><div class="num">${needAsgn}</div><div class="lbl">يحتاج إسناد</div></div>
      <div class="stat" style="border-top:3px solid #f59e0b"><div class="num">${soon.length}</div><div class="lbl">تنتهي خلال 30 يوم</div></div>
    `;

    const progCounts = {};
    clients.forEach(c => { progCounts[c.program] = (progCounts[c.program]||0)+1; });
    const progMax = Math.max(...Object.values(progCounts), 1);
    const colors = ['#0D40FC','#001442','#6366f1','#8b5cf6','#06b6d4','#10b981'];
    document.getElementById('prog-chart').innerHTML = Object.entries(progCounts).sort((a,b)=>b[1]-a[1]).map(([name,count],i) => `
      <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text);font-weight:500">${name.split('—')[0].trim()}</span><span style="color:var(--muted)">${count} عميل</span></div><div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.round(count/progMax*100)}%;background:${colors[i%colors.length]};border-radius:4px;transition:width .5s"></div></div></div>
    `).join('') || '<div class="empty">لا بيانات</div>';

    const srcCounts = {};
    clients.forEach(c => { srcCounts[c.source] = (srcCounts[c.source]||0)+1; });
    const srcMax = Math.max(...Object.values(srcCounts), 1);
    document.getElementById('src-chart').innerHTML = Object.entries(srcCounts).sort((a,b)=>b[1]-a[1]).map(([name,count],i) => `
      <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text);font-weight:500">${name}</span><span style="color:var(--muted)">${count} عميل (${total ? Math.round(count/total*100) : 0}%)</span></div><div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${Math.round(count/srcMax*100)}%;background:${colors[(i+2)%colors.length]};border-radius:4px;transition:width .5s"></div></div></div>
    `).join('') || '<div class="empty">لا بيانات</div>';

    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(year, month - i, 1);
      const count = clients.filter(c => {
        const cd = safeParseDate(c.createdAt);
        return cd && cd.getMonth() === d.getMonth() && cd.getFullYear() === d.getFullYear();
      }).length;
      months.push({ label: d.toLocaleDateString('ar-SA',{month:'short'}), count });
    }
    const monthMax = Math.max(...months.map(m=>m.count), 1);
    document.getElementById('monthly-chart').innerHTML = `<div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:24px;position:relative">${
      months.map(m => `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%"><div style="flex:1;display:flex;align-items:flex-end;width:100%"><div style="width:100%;background:#0D40FC;border-radius:4px 4px 0 0;height:${m.count ? Math.max(Math.round(m.count/monthMax*100),8) : 0}%;transition:height .5s;position:relative">${m.count ? `<span style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;color:var(--text);white-space:nowrap">${m.count}</span>` : ''}</div></div><span style="font-size:10px;color:var(--muted);white-space:nowrap">${m.label}</span></div>`).join('')
    }</div>`;

    document.getElementById('expiry-list').innerHTML = soon.length ? soon.map(c => {
      const exp = new Date(c.expiry);
      const diff = Math.ceil((exp - now) / 86400000);
      const urgent = diff <= 7;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDetail('${c.ref}')"><div style="width:36px;height:36px;border-radius:50%;background:${urgent?'#fee2e2':'#fef3c7'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${urgent?'#b91c1c':'#b45309'};flex-shrink:0">${diff}د</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text)">${c.name}</div><div style="font-size:11px;color:var(--muted)">${c.program.split('—')[0].trim()} · ${c.source}</div></div><div style="text-align:left"><div style="font-size:12px;font-weight:500;color:${urgent?'#b91c1c':'#b45309'}">${c.expiry}</div><button class="btn sm" style="margin-top:3px;background:#25D366;color:#fff;border-color:#25D366;padding:3px 8px;font-size:10px" onclick="event.stopPropagation();selId='${c.ref}';openWhatsApp()">تذكير</button></div></div>`;
    }).join('') : '<div class="empty">لا توجد اشتراكات تنتهي قريباً</div>';
  };

  window.render = function () {
    if (role === 'sales') {
      document.getElementById('sales-count').textContent = clients.length;
      fillFilterSelects();
      renderFiltered();
    }
    if (role === 'academy') {
      const pending = clients.filter(c => !c.academyAssigned);
      const done = clients.filter(c => c.academyAssigned);
      const al = document.getElementById('main-alert');
      if (pending.length) {
        al.classList.add('show');
        document.getElementById('alert-txt').textContent = `${pending.length} عميل بانتظار التفعيل`;
      } else {
        al.classList.remove('show');
      }
      document.getElementById('aca-pend-count').textContent = pending.length;
      document.getElementById('aca-done-count').textContent = done.length;
      document.getElementById('al-pending').innerHTML = pending.length ? pending.map(cardHTML).join('') : '<div class="empty">لا يوجد عملاء معلقون</div>';
      document.getElementById('al-done').innerHTML = done.length ? done.map(cardHTML).join('') : '<div class="empty">—</div>';
    }
    if (role === 'finance') {
      document.getElementById('fin-count').textContent = clients.length;
      document.getElementById('fl').innerHTML = clients.length ? clients.map(c => {
        const status = c.academyAssigned ? '<span class="pill p-done">مكتمل</span>' : '<span class="pill p-pending">جارٍ</span>';
        return `<div class="cc${selId===c.ref?' sel':''}" onclick="openDetail('${c.ref}')"><div class="cc-top"><span class="cc-name">${c.name}</span><span class="cc-ref">${c.ref}</span></div><div class="cc-meta">${srcPill(c.source)}${status}<span style="font-size:11px;color:var(--muted)">${c.createdAt}</span></div></div>`;
      }).join('') : '<div class="empty">لا يوجد سجلات</div>';
    }
    if (role === 'settings') {
      const pl = document.getElementById('prog-list');
      if (pl) {
        pl.innerHTML = programs.map((p,i) => `<div class="cc" style="cursor:default;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><span class="pill p-prog">برنامج ${i+1}</span><span style="font-size:13px;font-weight:500">${p}</span></div><button class="btn sm" style="color:#b91c1c;border-color:#fca5a5" onclick="removeProgram(${i})">حذف</button></div>`).join('') || '<div class="empty">لا توجد برامج</div>';
      }
      const sl2 = document.getElementById('src-list');
      if (sl2) {
        sl2.innerHTML = sources.map((s,i) => `<div class="cc" style="cursor:default;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px">${srcPill(s.name)}<span style="font-size:12px;color:var(--muted)">${s.assign ? 'يحتاج إسناد' : 'تلقائي'}</span></div><button class="btn sm" style="color:#b91c1c;border-color:#fca5a5" onclick="removeSource(${i})">حذف</button></div>`).join('') || '<div class="empty">لا توجد مصادر</div>';
      }
    }
    if (selId) renderDetail(selId);
  };

  document.addEventListener('DOMContentLoaded', function () {
    const adv = document.getElementById('adv-filters');
    if (adv) adv.style.display = 'none';
  });
})();
</script>
